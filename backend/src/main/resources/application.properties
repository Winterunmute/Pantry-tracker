# -------------------------------------------------------
# Pantry Tracker – base application properties
# Secrets and environment-specific values live in
# application-local.properties (gitignored).
# -------------------------------------------------------

spring.application.name=pantry-tracker

# Load the local overrides profile by default.
# Override with -Dspring.profiles.active=prod for Railway.
spring.profiles.active=local

# MongoDB – overridden in application-local.properties
spring.data.mongodb.uri=mongodb://localhost:27017/pantrytracker

# JWT – overridden in application-local.properties
jwt.secret=change-me-in-application-local-properties
jwt.expiration=900000
jwt.refresh-expiration=2592000000

# Jackson – serialize LocalDate / LocalDateTime as ISO strings
spring.jackson.serialization.write-dates-as-timestamps=false
# Accept lowercase enum values from the frontend (e.g. "pantry" → PANTRY)
spring.jackson.mapper.accept-case-insensitive-enums=true
